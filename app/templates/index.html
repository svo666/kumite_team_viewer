<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kumite Team Viewer</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
<main class="app-shell">
  <section class="controls">
    <label>Source URL
      <input id="sourceUrl" type="url" value="{{ default_source_url }}">
    </label>
    <label>Team
      <select id="teamSelect"><option value="">All teams</option></select>
    </label>
    <button id="refreshBtn" type="button">Refresh now</button>
  </section>

  <div class="table-wrap">
    <table id="scheduleTable">
      <thead id="scheduleHead"></thead>
      <tbody id="scheduleBody"></tbody>
    </table>
  </div>

  <footer class="page-footer">
    <section class="status">
      <span id="connectionText">Connecting...</span>
      <span id="statusText">Waiting for first server refresh.</span>
      <span id="errorText" class="error"></span>
    </section>

  </footer>
</main>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
