<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kumite Team Viewer</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
<header>
  <div>
    <h1>Kumite Team Viewer</h1>
    <p>Combines all configured tatamis and filters fights by team.</p>
  </div>
  <button id="refreshBtn" type="button">Refresh now</button>
</header>

<section class="controls">
  <label>Source URL
    <input id="sourceUrl" type="url" value="{{ default_source_url }}">
  </label>
  <label>Tatami IDs
    <input id="tatamiIds" type="text" value="{{ default_tatami_ids }}" placeholder="1,2,3,4">
  </label>
  <label>Team
    <select id="teamSelect"><option value="">All teams</option></select>
  </label>
  <label>Browser poll seconds
    <input id="pollSeconds" type="number" min="30" step="5" value="{{ default_poll_seconds }}">
  </label>
</section>

<section class="status">
  <span id="statusText">Not loaded yet.</span>
  <span id="errorText" class="error"></span>
</section>

<div class="legend">
  <span><b class="swatch current"></b> current fight</span>
  <span><b class="swatch winner"></b> winner</span>
</div>

<div class="table-wrap">
  <table id="scheduleTable">
    <thead id="scheduleHead"></thead>
    <tbody id="scheduleBody"></tbody>
  </table>
</div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
